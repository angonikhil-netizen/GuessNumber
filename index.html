<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="game-card">
        <h2> Guess the Number Game</h2>
        <p class="description">I'm thinking of a number between 1 and 100. Can you guess it?</p>
        
        <div class="input-area">
            <input type="number" id="userGuess" placeholder="Enter number..." min="1" max="100">
            <button onclick="makeGuess()">Submit Guess</button>
        </div>
        
        <div id="feedback" class="feedback-box"></div>
    </div>

    <script>
        async function makeGuess() {
            const guessInput = document.getElementById('userGuess');
            const feedback = document.getElementById('feedback');
            const guessValue = guessInput.value;

            if (!guessValue) {
                feedback.innerText = "Please enter a number first!";
                feedback.className = "feedback-box hint";
                return;
            }

            const response = await fetch('/guess', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({guess: guessValue})
            });

            const data = await response.json();
            feedback.innerText = data.message;
            feedback.className = "feedback-box " + data.status;
            
            

            guessInput.value = '';
            guessInput.focus();
        }
    </script>
</body>
</html>
